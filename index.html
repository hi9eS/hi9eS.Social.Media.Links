<style>
:root {
  --bg:        #060608;
  --surface:   #0d0d12;
  --border:    rgba(255,255,255,0.06);
  --border-h:  rgba(255,255,255,0.13);
  --text:      #e8e8ee;
  --muted:     #55566a;
  --accent:    #3b82f6;
  --accent-dim:#1d4ed8;
  --danger:    #ef4444;
  --radius:    14px;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-head);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 48px 16px 64px;
  overflow-x: hidden;
}

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── GLOW ── */
.glow {
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse at center, rgba(59,130,246,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── HEADER ── */
.header {
  padding: 0 4px 36px;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}

.header-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-tag::before {
  content: '';
  display: block;
  width: 18px;
  height: 1px;
  background: var(--accent);
}

.header h1 {
  font-size: clamp(32px, 8vw, 42px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  color: #fff;
}

.header h1 span {
  color: var(--accent);
}

.header p {
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
  letter-spacing: 0.03em;
}

/* ── LINKS LIST ── */
.links {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ── LINK CARD ── */
.link-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  opacity: 0;
  transform: translateY(14px);
}

.link-card.visible {
  animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}

.link-card.normal { padding: 15px 18px; }
.link-card.small  { padding: 11px 16px; }
.link-card.large  { padding: 20px 22px; }

/* Shimmer on hover */
.link-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
  pointer-events: none;
}

.link-card:hover {
  border-color: var(--border-h);
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.08);
}

.link-card:hover::before {
  transform: translateX(100%);
}

.link-card:active {
  transform: scale(0.98);
}

.link-card.disabled {
  cursor: default;
  pointer-events: none;
}

/* Left accent bar */
.link-card .bar {
  position: absolute;
  left: 0;
  top: 20%;
  bottom: 20%;
  width: 2px;
  border-radius: 99px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s, top 0.2s, bottom 0.2s;
}
.link-card:hover .bar {
  opacity: 1;
  top: 10%;
  bottom: 10%;
}

/* Icon */
.card-icon {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: color 0.2s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.link-card:hover .card-icon { color: var(--text); transform: scale(1.12); }

.link-card.normal .card-icon svg { width: 18px; height: 18px; }
.link-card.small  .card-icon svg { width: 14px; height: 14px; }
.link-card.large  .card-icon svg { width: 22px; height: 22px; }

/* Text */
.card-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.card-name {
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1;
  transition: color 0.2s;
}
.link-card.normal .card-name { font-size: 14px; }
.link-card.small  .card-name { font-size: 12px; }
.link-card.large  .card-name { font-size: 17px; }

.link-card:hover .card-name { color: #fff; }

.card-url {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 300;
  color: var(--muted);
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transform: translateY(-3px);
  transition: opacity 0.2s, max-height 0.2s, transform 0.2s;
}
.link-card:hover .card-url {
  opacity: 1;
  max-height: 20px;
  transform: translateY(0);
}

/* Status badge */
.badge {
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 4px;
}
.badge-soon {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
}

/* Arrow */
.arrow {
  flex-shrink: 0;
  color: var(--muted);
  opacity: 0;
  transform: translateX(-4px);
  transition: opacity 0.2s, transform 0.2s;
}
.link-card:hover .arrow { opacity: 1; transform: translateX(0); }

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  opacity: 0;
  animation: fadeUp 0.4s ease 0.8s forwards;
}
.divider span {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── FOOTER ── */
.footer {
  margin-top: 40px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.4s ease 1.2s forwards;
}
.footer .build {
  display: flex;
  align-items: center;
  gap: 5px;
}
.footer .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <!-- Header -->
  <div class="header" id="header"></div>

  <!-- Links -->
  <div class="links" id="links"></div>

  <!-- Footer -->
  <div class="footer" id="footer"></div>
</div>

<script>
// ── RENDER HEADER ──────────────────────────────────────────────────────────────
const headerEl = document.getElementById('header');
headerEl.innerHTML = `
  <div class="header-tag">social links</div>
  <h1>${PROFILE.name.replace('hi9eS', 'hi9<span>e</span>S')}</h1>
  <p>${PROFILE.tagline}</p>
`;

// ── RENDER LINKS ───────────────────────────────────────────────────────────────
const linksEl = document.getElementById('links');

const active  = LINKS.filter(l => l.status === 'active');
const inactive = LINKS.filter(l => l.status !== 'active');

function renderCard(link, delay) {
  const tag = link.url ? 'a' : 'div';
  const card = document.createElement(tag);
  const size = link.size || 'normal';

  card.className = `link-card ${size}${link.status !== 'active' ? ' disabled' : ''}`;
  card.style.animationDelay = `${delay}ms`;

  if (link.url) {
    card.href   = link.url;
    card.target = '_blank';
    card.rel    = 'noopener noreferrer';
  }

  const displayUrl = link.url ? link.url.replace(/^https?:\/\//, '').replace(/\/$/, '') : '';

  card.innerHTML = `
    <div class="bar"></div>
    <div class="card-icon">${link.icon}</div>
    <div class="card-body">
      <span class="card-name">${link.name}</span>
      ${displayUrl ? `<span class="card-url">${displayUrl}</span>` : ''}
    </div>
    ${link.status === 'soon' ? `<span class="badge badge-soon">soon</span>` : ''}
    ${link.url ? `<svg class="arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>` : ''}
  `;

  return card;
}

// Active links
active.forEach((link, i) => {
  const card = renderCard(link, 300 + i * 55);
  linksEl.appendChild(card);
});

// Divider before inactive
if (inactive.length) {
  const div = document.createElement('div');
  div.className = 'divider';
  div.innerHTML = '<span>coming soon</span>';
  linksEl.appendChild(div);

  inactive.forEach((link, i) => {
    const card = renderCard(link, 800 + i * 55);
    linksEl.appendChild(card);
  });
}

// Trigger card animations via IntersectionObserver (or immediate fallback)
const cards = document.querySelectorAll('.link-card');
if ('IntersectionObserver' in window) {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, { threshold: 0.1 });
  cards.forEach(c => obs.observe(c));
} else {
  cards.forEach(c => c.classList.add('visible'));
}

// ── RENDER FOOTER ──────────────────────────────────────────────────────────────
document.getElementById('footer').innerHTML = `
  <span>© OXeall & ${PROFILE.name}</span>
  <span class="build"><span class="dot"></span> build #${PROFILE.build}</span>
`;
</script>
